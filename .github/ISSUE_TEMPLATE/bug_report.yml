name: Bug report
description: Report a reproducible problem
title: 'Bug: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the command or web workflow you used and any relevant CSV sample with sensitive data removed.
      placeholder: |
        1. Run `java -jar ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: '17.0.x'
    validations:
      required: false
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: '24.x'
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: 'macOS, Linux, Windows'
    validations:
      required: true
