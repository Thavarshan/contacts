name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: Java (${{ matrix.os }}, Java ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        java:
          - '17'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Verify Maven wrapper
        run: ./mvnw --version

      - name: Run full Maven verification
        run: ./mvnw -B -ntp verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-${{ matrix.os }}-java-${{ matrix.java }}
          path: '**/target/surefire-reports/'
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload static-analysis reports
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-reports
          path: |
            **/target/pmd.xml
            **/target/spotbugsXml.xml
            **/target/site/pmd.html
            **/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload CLI artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: contacts-cli-java-${{ matrix.java }}
          path: cli/target/*-cli.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload API artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: contacts-api-java-${{ matrix.java }}
          path: api/target/*-api.jar
          if-no-files-found: error
          retention-days: 14

  web:
    name: Web (Ubuntu, Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - '24'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Check web formatting
        run: npm run format:check
        working-directory: web

      - name: Lint web
        run: npm run lint
        working-directory: web

      - name: Type-check web
        run: npm run typecheck
        working-directory: web

      - name: Test web
        run: npm run test:run
        working-directory: web

      - name: Build web
        run: npm run build
        working-directory: web

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs:
      - java
      - web

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: false
          load: false
          tags: contacts-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: false
          load: false
          tags: contacts-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  infrastructure:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform -chdir=infra/terraform fmt -recursive -check

      - name: Initialize Terraform without backend
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Validate Terraform
        run: terraform -chdir=infra/terraform validate
